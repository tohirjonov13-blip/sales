<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Точка Роста — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* === Surfaces === */
  --bg:          #F5F6F8;          /* page bg — very subtle cool gray */
  --surface:     #FFFFFF;          /* cards / panels */
  --surface-2:   #F9FAFB;          /* nested fills, hovers */
  --surface-3:   #EEF0F3;          /* deeper fills */

  /* === Ink / Text === */
  --ink:         #0A0F1A;          /* near-black, deep */
  --ink-2:       #1E2330;
  --text:        #0F172A;
  --text-2:      #475569;
  --muted:       #64748B;
  --muted-2:     #94A3B8;

  /* === Borders === */
  --line:        #E5E8EE;          /* clean cool border */
  --line-soft:   #EFF1F5;
  --line-strong: #D5D9E2;

  /* === Brand === */
  --navy:        #0F172A;
  --orange:      #FF6B00;
  --orange-glow: #FFAF6B;

  /* === Vibrant accents (iOS-like) === */
  --blue:        #0066FF;
  --blue-bg:     #E6EFFF;
  --indigo:      #5B5FE9;
  --indigo-bg:   #EDEDFD;
  --purple:      #8B5CF6;
  --purple-bg:   #F3EDFE;
  --pink:        #EC4899;
  --pink-bg:     #FDEAF4;
  --teal:        #14B8A6;
  --teal-bg:     #E0F7F3;
  --green:       #10B981;
  --green-bg:    #DCFCE7;
  --green-deep:  #047857;
  --amber:       #F59E0B;
  --amber-bg:    #FEF3C7;
  --amber-deep:  #B45309;
  --red:         #EF4444;
  --red-bg:      #FEE2E2;
  --red-deep:    #B91C1C;
  --orange-bg:   #FFEDD5;

  /* === Type === */
  --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  /* === Spacing === */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-7: 32px;
  --sp-8: 48px;
  --sp-9: 64px;

  /* === Radius === */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-full: 9999px;

  /* === Shadow === */
  --sh-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.05);
  --sh-md: 0 4px 12px rgba(15,23,42,0.05), 0 2px 4px rgba(15,23,42,0.04);
  --sh-lg: 0 12px 32px rgba(15,23,42,0.08), 0 4px 8px rgba(15,23,42,0.04);
  --sh-ink: 0 12px 36px rgba(10,15,26,0.16), 0 4px 8px rgba(10,15,26,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "ss02";
}

/* === Section labels === */

/* ============================================
   TOPBAR
   ============================================ */
.topbar {
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--line);
  padding: 0 var(--sp-7);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}

.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--orange) 0%, #FF9444 100%);
  display: grid;
  place-items: center;
  color: white;
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.02em;
  box-shadow: 0 4px 14px rgba(255,107,0,0.32), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative;
}

.brand-name {
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1.1;
}

.brand-sub {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-top: 1px;
  font-weight: 500;
}

.nav {
  display: flex;
  gap: 4px;
  background: var(--surface-3);
  padding: 4px;
  border-radius: var(--r-md);
}

.nav a {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  transition: all 0.15s;
  letter-spacing: -0.005em;
}

.nav a:hover { color: var(--ink); }

.nav a.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--sh-sm);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}

.month-pick {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.005em;
}

.month-pick::after {
  content: "⌄";
  font-size: 14px;
  color: var(--muted);
  margin-top: -4px;
}

.avatar {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--blue), var(--indigo));
  color: white;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 15px;
  display: grid;
  place-items: center;
  border-radius: var(--r-full);
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,102,255,0.28);
}

/* ============================================
   PAGE CONTENT
   ============================================ */
.main {
  max-width: 1320px;
  margin: 0 auto;
  padding: var(--sp-7) var(--sp-7);
}

.page-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: var(--sp-7);
  flex-wrap: wrap;
  gap: var(--sp-4);
}

.page-title {
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 38px;
  line-height: 1.1;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.page-title-sub {
  margin-top: 6px;
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
}

.page-meta {
  display: flex;
  gap: var(--sp-2);
  flex-wrap: wrap;
}

.meta-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.meta-chip span {
  color: var(--muted);
  font-weight: 500;
}
.meta-chip .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

/* ============================================
   STAT GRID
   ============================================ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-4);
  margin-bottom: var(--sp-5);
}

.stat {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}
.stat:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }

.stat.featured {
  background: linear-gradient(135deg, var(--ink) 0%, #1A2236 100%);
  border-color: var(--ink);
  color: white;
  box-shadow: var(--sh-ink);
}
.stat.featured::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 160px;
  height: 160px;
  background: radial-gradient(circle, var(--orange) 0%, transparent 60%);
  opacity: 0.18;
  pointer-events: none;
}

.stat-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--r-sm);
  display: grid;
  place-items: center;
  margin-bottom: var(--sp-4);
  font-size: 18px;
}
.stat-icon.blue   { background: var(--blue-bg); color: var(--blue); }
.stat-icon.purple { background: var(--purple-bg); color: var(--purple); }
.stat-icon.pink   { background: var(--pink-bg); color: var(--pink); }
.stat-icon.teal   { background: var(--teal-bg); color: var(--teal); }
.stat-icon.green  { background: var(--green-bg); color: var(--green-deep); }
.stat-icon.orange { background: var(--orange-bg); color: var(--orange); }
.stat.featured .stat-icon { background: rgba(255,255,255,0.12); color: var(--orange-glow); }

.stat-label {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: -0.005em;
}
.stat.featured .stat-label { color: rgba(255,255,255,0.7); }

.stat-value {
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 38px;
  line-height: 1.05;
  letter-spacing: -0.03em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.stat.featured .stat-value { color: white; }
.stat-value sup {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  vertical-align: super;
  letter-spacing: 0;
}
.stat.featured .stat-value sup { color: rgba(255,255,255,0.5); }

.stat-sub {
  margin-top: var(--sp-3);
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.stat.featured .stat-sub { color: rgba(255,255,255,0.6); }

.stat-trend {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: var(--sp-3);
  padding: 3px 8px;
  border-radius: var(--r-full);
  background: var(--green-bg);
  color: var(--green-deep);
  font-size: 11px;
  font-weight: 700;
}
.stat.featured .stat-trend {
  background: rgba(16,185,129,0.18);
  color: #6EE7B7;
}

/* ============================================
   LEVEL ROW
   ============================================ */
.level-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: var(--sp-4);
  margin-bottom: var(--sp-5);
}

.level-card, .progress-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-6);
}

.level-card {
  background:
    radial-gradient(ellipse at top right, var(--purple-bg) 0%, transparent 50%),
    radial-gradient(ellipse at bottom left, var(--blue-bg) 0%, transparent 50%),
    var(--surface);
  position: relative;
  overflow: hidden;
}

.level-card::before {
  content: "";
  position: absolute;
  top: 20px;
  right: 20px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--orange);
  box-shadow: 0 0 0 4px var(--orange-bg);
}

.level-head {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--purple);
  letter-spacing: -0.005em;
  margin-bottom: var(--sp-3);
}

.level-head::before {
  content: "✦";
  font-size: 16px;
}

.level-name {
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 52px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--ink);
  background: linear-gradient(135deg, var(--ink), var(--purple));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.level-range {
  margin-top: 6px;
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
}

.level-meta {
  display: flex;
  gap: var(--sp-6);
  margin-top: var(--sp-6);
  padding-top: var(--sp-5);
  border-top: 1px dashed var(--line);
}

.level-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.level-meta-item span {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: -0.005em;
}

.level-meta-item strong {
  font-family: var(--font-sans);
  font-size: 24px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
}
.level-meta-item.accent strong { color: var(--orange); }
.level-meta-item.purple strong { color: var(--purple); }

/* Progress card */
.progress-title {
  font-family: var(--font-sans);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: var(--sp-4);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.progress-pct {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 700;
  color: white;
  background: var(--blue);
  padding: 3px 10px;
  border-radius: var(--r-full);
}

.progress-bar {
  height: 10px;
  background: var(--surface-3);
  border-radius: var(--r-full);
  position: relative;
  margin-bottom: var(--sp-3);
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--blue), var(--indigo));
  width: 84%;
  border-radius: var(--r-full);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
}

.progress-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: var(--sp-5);
  font-weight: 500;
}

.bonus-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3);
}

.bonus {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4);
  position: relative;
  overflow: hidden;
}
.bonus::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
}
.bonus.orange::before { background: var(--orange); }
.bonus.purple::before { background: var(--purple); }

.bonus-label {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 4px;
}

.bonus-value {
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

/* ============================================
   EARNINGS BANNER
   ============================================ */
.earnings {
  background:
    radial-gradient(circle at 88% 50%, rgba(255,107,0,0.22) 0%, transparent 55%),
    linear-gradient(135deg, var(--ink) 0%, #1A2236 100%);
  color: white;
  padding: var(--sp-7);
  margin-bottom: var(--sp-5);
  border-radius: var(--r-xl);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: var(--sp-6);
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh-ink);
}
.earnings::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, var(--orange) 0%, transparent 60%);
  opacity: 0.4;
  pointer-events: none;
  filter: blur(40px);
}

.earnings-content { position: relative; z-index: 1; }

.earnings-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.005em;
  color: rgba(255,255,255,0.7);
  margin-bottom: var(--sp-3);
  padding: 4px 10px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--r-full);
  backdrop-filter: blur(8px);
}
.earnings-label::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--orange);
  box-shadow: 0 0 12px var(--orange);
}

.earnings-total {
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 80px;
  line-height: 0.95;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
}
.earnings-total sup {
  font-family: var(--font-sans);
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  vertical-align: super;
  margin-left: 8px;
  letter-spacing: 0;
}

.earnings-break {
  display: flex;
  gap: var(--sp-5);
  margin-top: var(--sp-5);
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.earnings-break div {
  font-family: var(--font-sans);
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  font-weight: 600;
}
.earnings-break strong {
  display: block;
  font-family: var(--font-sans);
  font-weight: 700;
  color: white;
  font-size: 15px;
  letter-spacing: -0.01em;
  margin-top: 2px;
}

.earnings-actions {
  display: flex;
  gap: var(--sp-3);
  align-items: end;
  position: relative;
  z-index: 1;
}

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.005em;
  padding: 10px 18px;
  border: 0;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--orange);
  color: white;
  box-shadow: 0 4px 14px rgba(255,107,0,0.32);
}
.btn-primary:hover { background: #E55F00; }

.btn-ink {
  background: var(--ink);
  color: white;
  box-shadow: var(--sh-md);
}
.btn-ink:hover { background: var(--ink-2); }

.btn-blue {
  background: var(--blue);
  color: white;
  box-shadow: 0 4px 14px rgba(0,102,255,0.28);
}
.btn-blue:hover { background: #0052CC; }

.btn-ghost {
  background: rgba(255,255,255,0.1);
  color: white;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.16);
}
.btn-ghost:hover { background: rgba(255,255,255,0.16); }

.btn-line {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--line);
}
.btn-line:hover { background: var(--surface-2); }

.btn-text {
  background: transparent;
  color: var(--blue);
  padding: 6px 0;
  font-weight: 600;
  border-radius: 0;
}

/* ============================================
   ADMIN MANAGER CARD
   ============================================ */
.mgr-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-4);
  margin-bottom: var(--sp-7);
}

.mgr-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  display: grid;
  gap: var(--sp-4);
  transition: all 0.15s;
}
.mgr-card:hover { box-shadow: var(--sh-md); }

.mgr-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.mgr-id {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}

.mgr-avatar {
  width: 48px;
  height: 48px;
  color: white;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 19px;
  display: grid;
  place-items: center;
  border-radius: var(--r-md);
  letter-spacing: -0.02em;
}
.mgr-avatar.purple { background: linear-gradient(135deg, var(--purple), #A78BFA); box-shadow: 0 4px 14px rgba(139,92,246,0.32); }
.mgr-avatar.blue { background: linear-gradient(135deg, var(--blue), var(--indigo)); box-shadow: 0 4px 14px rgba(0,102,255,0.28); }
.mgr-avatar.pink { background: linear-gradient(135deg, var(--pink), #F472B6); box-shadow: 0 4px 14px rgba(236,72,153,0.32); }
.mgr-avatar.teal { background: linear-gradient(135deg, var(--teal), #2DD4BF); box-shadow: 0 4px 14px rgba(20,184,166,0.32); }

.mgr-name {
  font-family: var(--font-sans);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.mgr-level {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 600;
}

.goal-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--orange-bg);
  color: var(--orange);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  border-radius: var(--r-full);
}

.mgr-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-2);
  padding: var(--sp-4);
  background: var(--surface-2);
  border-radius: var(--r-md);
}

.mgr-stat {
  text-align: center;
}

.mgr-stat-val {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.mgr-stat.accent .mgr-stat-val { color: var(--orange); }

.mgr-stat-val small {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0;
}

.mgr-stat-lab {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--muted);
  margin-top: 6px;
  text-transform: uppercase;
}

.mgr-progress {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}

.mgr-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--surface-3);
  border-radius: var(--r-full);
  position: relative;
  overflow: hidden;
}
.mgr-progress-fill {
  position: absolute;
  inset: 0;
  border-radius: var(--r-full);
}
.mgr-progress-fill.over { background: linear-gradient(90deg, var(--green), #34D399); }
.mgr-progress-fill.normal { background: linear-gradient(90deg, var(--blue), var(--indigo)); }

.mgr-progress-text {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--muted);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.mgr-earnings {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-3);
  padding: var(--sp-3);
  background: var(--ink);
  border-radius: var(--r-md);
  color: rgba(255,255,255,0.7);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
}

.mgr-earnings span strong {
  color: white;
  font-weight: 700;
  margin-left: 4px;
  font-size: 12px;
}
.mgr-earnings .total strong { color: var(--orange-glow); }
.mgr-earnings .sep {
  width: 1px;
  background: rgba(255,255,255,0.12);
  margin: 2px 0;
}

/* ============================================
   SALES TABLE
   ============================================ */
.sheet {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  margin-bottom: var(--sp-7);
  overflow: hidden;
}

.sheet-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-5) var(--sp-5);
  border-bottom: 1px solid var(--line);
}

.sheet-title {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.sheet-actions { display: flex; gap: var(--sp-3); }

.sheet-filter {
  display: flex;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-5);
  border-bottom: 1px solid var(--line);
  align-items: center;
  background: var(--surface-2);
}

.filter-chip {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  padding: 6px 12px;
  cursor: pointer;
  border-radius: var(--r-full);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.filter-chip:hover { background: var(--surface-3); color: var(--text); }
.filter-chip.on {
  background: var(--ink);
  color: white;
}
.filter-chip .count {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--muted-2);
}
.filter-chip.on .count { color: rgba(255,255,255,0.5); }

.month-lock {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--green-bg);
  color: var(--green-deep);
  border-radius: var(--r-full);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
}
.month-lock-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  text-align: left;
  padding: 12px var(--sp-4);
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}

tbody td {
  padding: var(--sp-4);
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: 0; }
tbody tr:hover { background: var(--surface-2); }

.cell-num {
  font-family: var(--font-mono);
  color: var(--muted-2);
  font-size: 12px;
  font-weight: 500;
}

.cell-name strong {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 700;
  display: block;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.cell-name span {
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

.cell-money {
  font-family: var(--font-sans);
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  font-weight: 600;
}
.cell-money small { color: var(--muted); font-weight: 500; }

.course-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 600;
  background: var(--surface-3);
  color: var(--text);
}
.course-pill .lang {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  padding-left: 6px;
  border-left: 1px solid var(--line-strong);
}

.cell-actions {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
}

.icon-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--line);
  background: var(--surface);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 13px;
  color: var(--text-2);
  border-radius: var(--r-sm);
  transition: all 0.15s;
}
.icon-btn:hover {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}

/* Status badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border-radius: var(--r-full);
  transition: all 0.15s;
  letter-spacing: -0.005em;
}

.badge::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.badge.active {
  background: var(--green-bg);
  color: var(--green-deep);
}
.badge.active::before { background: var(--green); box-shadow: 0 0 8px var(--green); }

.badge.draft {
  background: var(--amber-bg);
  color: var(--amber-deep);
}
.badge.draft::before { background: var(--amber); }

.badge.cancel {
  background: var(--red-bg);
  color: var(--red-deep);
}
.badge.cancel::before { background: var(--red); }

.badge::after {
  content: "⌄";
  font-size: 10px;
  opacity: 0.5;
  margin-left: 2px;
  margin-top: -3px;
}

.badge.full {
  background: var(--ink);
  color: white;
  border: 0;
}
.badge.full::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
.badge.full::after { content: ""; margin: 0; }

.badge.full-no {
  background: var(--surface-3);
  color: var(--muted);
}
.badge.full-no::before, .badge.full-no::after { display: none; }

/* ============================================
   GOALS + CALCULATOR
   ============================================ */
.goals-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-4);
  margin-bottom: var(--sp-7);
}

.goals-pane, .calc-pane {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-6);
}

.calc-pane {
  background:
    radial-gradient(ellipse at top right, var(--blue-bg) 0%, transparent 60%),
    var(--surface);
}

.pane-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-5);
}

.pane-title {
  font-family: var(--font-sans);
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.025em;
}

.pane-sub {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}

.pane-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--r-sm);
  display: grid;
  place-items: center;
  font-size: 18px;
}
.pane-icon.purple { background: var(--purple-bg); color: var(--purple); }
.pane-icon.blue { background: var(--blue-bg); color: var(--blue); }

.goal-row {
  display: grid;
  grid-template-columns: 1fr 100px;
  align-items: center;
  gap: var(--sp-4);
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--line-soft);
}
.goal-row:last-of-type { border-bottom: 0; }

.goal-label {
  display: flex;
  flex-direction: column;
}
.goal-label span {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 2px;
  letter-spacing: -0.005em;
}
.goal-label strong {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.goal-bar {
  height: 4px;
  background: var(--surface-3);
  border-radius: var(--r-full);
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.goal-bar i {
  position: absolute;
  inset: 0;
  border-radius: var(--r-full);
  display: block;
  background: linear-gradient(90deg, var(--orange), #FF9444);
}

.goal-bar-text {
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  font-weight: 600;
}

.goal-input {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface);
  padding: 10px 12px;
  font-family: var(--font-sans);
  font-size: 18px;
  font-weight: 700;
  text-align: right;
  font-variant-numeric: tabular-nums;
  outline: none;
  color: var(--ink);
  width: 100%;
  letter-spacing: -0.02em;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.goal-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px var(--blue-bg);
}

/* Calc pane */
.calc-out {
  margin-top: var(--sp-5);
  padding: var(--sp-6);
  background:
    radial-gradient(ellipse at top right, rgba(0,102,255,0.4) 0%, transparent 50%),
    linear-gradient(135deg, var(--ink) 0%, #1A2236 100%);
  color: white;
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh-ink);
}

.calc-out-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  margin-bottom: var(--sp-3);
  padding: 4px 10px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--r-full);
}
.calc-out-label::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 12px var(--blue);
}

.calc-out-total {
  font-family: var(--font-sans);
  font-weight: 800;
  font-size: 56px;
  line-height: 0.95;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.035em;
}
.calc-out-total sup {
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  vertical-align: super;
  margin-left: 8px;
  letter-spacing: 0;
}

.calc-break {
  margin-top: var(--sp-5);
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-3);
}
.calc-break div {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-sans);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
  padding: 8px 12px;
  background: rgba(255,255,255,0.05);
  border-radius: var(--r-sm);
  backdrop-filter: blur(8px);
}
.calc-break strong {
  color: white;
  font-weight: 700;
}

.apply-row {
  margin-top: var(--sp-5);
  display: flex;
  justify-content: flex-end;
}

/* ============================================
   MODAL
   ============================================ */
.modal-stage {
  position: relative;
  padding: var(--sp-8) var(--sp-7);
  background:
    radial-gradient(ellipse at 20% 50%, var(--purple-bg) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 50%, var(--blue-bg) 0%, transparent 45%),
    var(--bg);
}

.modal {
  max-width: 540px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: var(--sp-7);
  position: relative;
  box-shadow: var(--sh-lg);
}

.modal-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: var(--sp-6);
}

.modal-title {
  font-family: var(--font-sans);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.1;
}
.modal-sub {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 600;
  padding: 4px 10px;
  background: var(--surface-2);
  border-radius: var(--r-full);
}

.modal-close {
  width: 32px;
  height: 32px;
  border: 1px solid var(--line);
  background: var(--surface);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 14px;
  color: var(--muted);
  border-radius: var(--r-sm);
}
.modal-close:hover { background: var(--surface-2); color: var(--text); }

.form-section {
  margin-bottom: var(--sp-5);
  padding-bottom: var(--sp-5);
  border-bottom: 1px solid var(--line-soft);
}
.form-section:last-of-type { border-bottom: 0; }

.form-section-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: var(--sp-3);
}
.form-section-label::before {
  content: "";
  width: 12px;
  height: 2px;
  background: var(--orange);
  border-radius: 2px;
}

.field {
  margin-bottom: var(--sp-3);
}

.field label {
  display: block;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
}

.field input, .field select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 11px 14px;
  background: var(--surface);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px var(--blue-bg);
}

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }

/* Segmented control */
.seg {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--surface-3);
  padding: 4px;
  border-radius: var(--r-md);
  gap: 2px;
}

.seg button {
  background: transparent;
  border: 0;
  padding: 10px 8px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: var(--r-sm);
  letter-spacing: -0.005em;
}

.seg button::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.4;
}

.seg button.on {
  background: var(--surface);
  box-shadow: var(--sh-sm);
}
.seg button.on::before { opacity: 1; }
.seg button.on.active { color: var(--green-deep); }
.seg button.on.active::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
.seg button.on.draft { color: var(--amber-deep); }
.seg button.on.draft::before { background: var(--amber); }
.seg button.on.cancel { color: var(--red-deep); }
.seg button.on.cancel::before { background: var(--red); }

.modal-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--sp-6);
  padding-top: var(--sp-5);
  border-top: 1px solid var(--line-soft);
}

.modal-meta {
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

.modal-actions-right { display: flex; gap: var(--sp-3); }

/* Toggle row */
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-3) var(--sp-4);
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  margin-top: var(--sp-3);
}

.toggle {
  width: 44px;
  height: 26px;
  background: var(--line-strong);
  border-radius: var(--r-full);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 22px;
  height: 22px;
  background: var(--surface);
  border-radius: 50%;
  transition: transform 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.toggle.on { background: var(--green); }
.toggle.on::after { transform: translateX(18px); }

/* ============================================
   PALETTE / TYPE GUIDE
   ============================================ */

@media (max-width: 900px) {
  .page-title { font-size: 28px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .level-row, .mgr-grid, .goals-grid { grid-template-columns: 1fr; }
  .nav { display: none; }
  .earnings { grid-template-columns: 1fr; }
  .earnings-total { font-size: 56px; }
}

/* === Month picker === */
.month-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-2); }
.month-opt { background: var(--surface-2); border: 1px solid var(--line); padding: 12px; font-family: var(--font-sans); font-size: 14px; font-weight: 600; border-radius: var(--r-sm); cursor: pointer; }
.month-opt.on { background: var(--ink); color: white; border-color: var(--ink); }

/* === Shim: legacy utility classes used by app shell, retokenized to v2 === */
.hidden { display: none !important; }
.main-content { min-height: 80vh; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.loading-spinner { display: inline-block; width: 22px; height: 22px; border: 2.5px solid var(--surface-3); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; font-weight: 500; }

/* === Profile dropdown === */
.profile-wrap { position: relative; }
.profile-dropdown { position: absolute; top: calc(100% + 8px); right: 0; width: 280px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: var(--sp-5); z-index: 300; opacity: 0; pointer-events: none; transform: translateY(-4px) scale(0.97); transform-origin: top right; transition: opacity 0.15s, transform 0.15s; box-shadow: var(--sh-lg); }
.profile-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
.pd-logo { display: flex; align-items: center; gap: 10px; padding-bottom: var(--sp-3); margin-bottom: var(--sp-4); border-bottom: 1px solid var(--line-soft); }
.pd-logo-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: linear-gradient(135deg, var(--orange), #FF9444); display: grid; place-items: center; font-family: var(--font-sans); font-weight: 800; font-size: 16px; color: white; }
.pd-logo-text { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.pd-logo-sub { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-top: 1px; }
.pd-user-name { font-size: 15px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.pd-user-role { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: var(--sp-3); }
.pd-login-title { font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em; margin-bottom: var(--sp-3); }

/* === Toast === */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--ink); color: white; padding: 12px 16px; border-radius: var(--r-md); font-family: var(--font-sans); font-size: 13px; font-weight: 600; min-width: 220px; max-width: 320px; display: flex; align-items: center; gap: 10px; box-shadow: var(--sh-lg); animation: toastIn 0.2s ease; }
.toast.error { background: var(--red); }
.toast.warning { background: var(--amber); color: var(--ink); }
.toast-icon { font-size: 16px; flex-shrink: 0; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* === Modal overlay (modal body styled by v2 .modal) === */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(15,23,42,0.32); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: var(--sp-5); opacity: 0; transition: opacity 0.18s; pointer-events: none; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-overlay .modal { max-height: 92vh; overflow-y: auto; transform: translateY(8px) scale(0.97); transition: transform 0.2s; }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-handle { display: none; }
.modal-body { padding: 0; }

/* === Trend chart === */
.trend-period-bar { display: inline-flex; gap: 4px; background: var(--surface-3); border-radius: var(--r-md); padding: 4px; margin-bottom: var(--sp-4); }
.trend-period-btn { background: transparent; border: 0; padding: 8px 14px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-radius: var(--r-sm); transition: all 0.15s; }
.trend-period-btn.active { background: var(--surface); color: var(--ink); box-shadow: var(--sh-sm); }
.trend-bars { display: flex; align-items: flex-end; gap: var(--sp-2); height: 140px; padding: var(--sp-3) 0; }
.trend-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; min-width: 32px; }
.trend-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
.trend-bar { width: 100%; background: linear-gradient(180deg, var(--blue), var(--indigo)); border-radius: var(--r-xs) var(--r-xs) 0 0; min-height: 4px; transition: height 0.6s ease; }
.trend-month { font-size: 11px; color: var(--muted); text-align: center; white-space: nowrap; font-weight: 600; }
.trend-count { font-size: 12px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
.trend-delta { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: var(--r-full); }
.trend-delta.up { background: var(--green-bg); color: var(--green-deep); }
.trend-delta.down { background: var(--red-bg); color: var(--red-deep); }

/* === Marketing leads table shim === */
.mkt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.mkt-table th { background: var(--surface-2); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--line); }
.mkt-table td { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); }
.mkt-table input[type=number] { width: 72px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 6px 10px; font-family: var(--font-sans); font-size: 13px; color: var(--ink); outline: none; text-align: center; font-weight: 600; }
.mkt-table input[type=number]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }

/* === Plan input field === */
.plan-input { width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 10px 12px; font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--ink); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.plan-input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-bg); }

/* === Settings page shim === */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); margin-top: var(--sp-5); }
@media(max-width:800px) { .grid-2 { grid-template-columns: 1fr; } }
.table-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: var(--sp-4) var(--sp-5); border-bottom: 1px solid var(--line); }
.table-title { font-family: var(--font-sans); font-size: 16px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }
.btn-xs { padding: 6px 12px; font-size: 11px; }
</style>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzvyh9JWchTfc14LaPNE7NZqFSwQxGcCrHBh1gqvddkSb2alPjqphx8BUcab-wboNuBDA/exec';

let STATE = {
  user: null,
  month: currentMonthName(),
  dashboard: null,
  sales: [],
  managers: [],
  courses: [],
  scale: [],
};

function currentMonthName() {
  const now = new Date();
  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return months[now.getMonth()] + ' ' + now.getFullYear();
}

function fmt(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(n || 0)); }
function fmtPct(n) { return ((n||0)*100).toFixed(2) + '%'; }

const WRITE_ACTIONS = ['addSale','updateSale','setSaleStatus','deleteSale','updateManager','addManager','deleteManager','setManagerPlan','updateScales','addCourse','deleteCourse','setMarketingData','closeMonth','openMonth','createUnlockRequest','resolveUnlockRequest','setGoal'];

function api(action, data={}) {
  if (WRITE_ACTIONS.indexOf(action) !== -1 && STATE.user) {
    data = Object.assign({}, data, { requester: { role: STATE.user.role, name: STATE.user.name } });
  }
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Math.random().toString(36).slice(2);
    const payload = { action, ...data, callback: callbackName };
    const params = new URLSearchParams();
    for (const [key, val] of Object.entries(payload)) {
      params.append(key, typeof val === 'object' && val !== null ? JSON.stringify(val) : String(val));
    }
    const script = document.createElement('script');
    script.src = SCRIPT_URL + '?' + params.toString();
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    window[callbackName] = (result) => { cleanup(); resolve(result); };
    function cleanup() {
      clearTimeout(timer);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = () => { cleanup(); reject(new Error('Ошибка соединения')); };
    document.head.appendChild(script);
  });
}

function toast(msg, type='success') {
  const icons = { success:'✅', error:'❌', warning:'⚠️' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function showModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function screen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setActiveNav(tab) {
  document.querySelectorAll('.nav a').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + tab);
  });
}

    renderProfileDropdown();
    dd.classList.add('open');
    if (!STATE.user) setTimeout(() => document.getElementById('li-pass')?.focus(), 80);
  }
}

// ── AUTH ──
async function doLogin() {
  const btn = document.getElementById('li-btn');
  const err = document.getElementById('li-err');
  const pass = document.getElementById('li-pass')?.value?.trim();
  if (!pass) { if(err) err.textContent = 'Введите пароль'; return; }

  if (btn) { btn.innerHTML = '<span class="loading-spinner"></span>'; btn.disabled = true; }
  if (err)  err.textContent = '';

  try {
    const res = await api('login', { password: pass });
    if (res.success) {
      STATE.user = { name: res.name, role: res.role, salary: res.salary || 0 };
      closeProfileDropdown();
      initApp();
    } else {
      if (err) err.textContent = res.error || 'Неверный пароль';
    }
  } catch(e) {
    if (err) err.textContent = 'Ошибка соединения с сервером';
  } finally {
    if (btn) { btn.innerHTML = 'Войти'; btn.disabled = false; }
  }
}

// ── APP INIT ──
async function initApp() {
  const u = STATE.user;

  document.getElementById('profile-btn').textContent = (u.name||'?')[0].toUpperCase();
  document.getElementById('month-sel-trigger').style.display = '';
  document.getElementById('main-content').innerHTML = '';

  const nav = document.getElementById('topbar-nav');
  const content = document.getElementById('main-content');
  nav.innerHTML = '';
  content.innerHTML = '';

  const tabs = getTabsForRole(u.role);
  tabs.forEach((t, i) => {
    const b = document.createElement('a');
    b.className = i === 0 ? 'active' : '';
    b.href = '#';
    b.textContent = t.label;
    b.dataset.tab = t.id;
    b.onclick = function(e) { e.preventDefault(); setActiveNav(t.id); loadCurrentTab(); };
    nav.appendChild(b);

    const div = document.createElement('div');
    div.className = 'tab-content' + (i===0?' active':'');
    div.id = 'tab-' + t.id;
    content.appendChild(div);
  });

  await loadMonthSelector();
  await loadCurrentTab();
}

function getTabsForRole(role) {
  if (role === 'manager') return [
    { id: 'dashboard', label: '📊 Дашборд' },
    { id: 'sales',     label: '📋 Реестр' },
    { id: 'goals',     label: '🎯 Цели' },
    { id: 'history',   label: '📜 История' },
  ];
  if (role === 'admin_full') return [
    { id: 'overview',  label: '📊 Обзор' },
    { id: 'registry',  label: '📋 Реестр' },
    { id: 'managers',  label: '👥 Менеджеры' },
    { id: 'requests',  label: '📥 Запросы' },
    { id: 'history',   label: '📜 История' },
    { id: 'settings',  label: '⚙️ Настройки' },
  ];
  if (role === 'admin_view') return [
    { id: 'overview', label: '📊 Обзор' },
    { id: 'registry', label: '📋 Реестр' },
  ];
  if (role === 'marketing') return [

  return [];
}

async function loadMonthSelector() {
  const trigger = document.getElementById('month-sel-trigger');
  trigger.style.display = '';
  trigger.textContent = STATE.month;
  trigger.onclick = openMonthPicker;
}

function openMonthPicker() {
  const now = new Date();
  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const options = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const name = months[d.getMonth()] + ' ' + d.getFullYear();
    options.push(
      '<button class="month-opt' + (name === STATE.month ? ' on' : '') +
      '" onclick="pickMonth(\'' + name + '\')">' + name + '</button>'
    );
  }
  showModal('Месяц', '<div class="month-grid">' + options.join('') + '</div>');
}

async function pickMonth(month) {
  STATE.month = month;
  document.getElementById('month-sel-trigger').textContent = month;
  closeModal();
  await loadCurrentTab();
}

async function loadCurrentTab() {
  const activeTab = document.querySelector('.nav a.active')?.dataset.tab;
  if (!activeTab) return;
  const role = STATE.user.role;
  if (role === 'manager') {
    if (activeTab === 'dashboard') await renderManagerDashboard();
    if (activeTab === 'sales')     await renderManagerSales();
    if (activeTab === 'goals')     await renderManagerGoals();
    if (activeTab === 'history')   await renderUserHistory();
  } else if (role === 'marketing') {
    if (activeTab === 'marketing') await renderMarketingDashboard();
  } else {
    if (activeTab === 'overview')  await renderAdminOverview();
    if (activeTab === 'registry')  await renderAdminRegistry();
    if (activeTab === 'managers')  await renderAdminManagers();
    if (activeTab === 'settings')  await renderSettings();
    if (activeTab === 'requests')  await renderAdminRequests();
    if (activeTab === 'history')   await renderUserHistory();
  }
}

// ── HELPERS ──
function getCalendarWeeks(monthName) {
  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const SHORT  = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const parts  = monthName.split(' ');
  const mIdx   = MONTHS.indexOf(parts[0]);
  const year   = parseInt(parts[1]);
  if (mIdx === -1 || isNaN(year)) return [];

  const firstDay = new Date(year, mIdx, 1);
  const lastDay  = new Date(year, mIdx + 1, 0);
  const dow      = firstDay.getDay();
  const offset   = dow === 0 ? -6 : 1 - dow;
  const firstMon = new Date(firstDay);
  firstMon.setDate(firstDay.getDate() + offset);

  const weeks = [];
  let cur = new Date(firstMon), num = 1;
  while (cur <= lastDay) {
    const end  = new Date(cur); end.setDate(cur.getDate() + 6);
    const oS   = cur < firstDay ? firstDay : new Date(cur);
    const oE   = end > lastDay  ? lastDay  : new Date(end);
    weeks.push({ num, start: new Date(cur), end: new Date(end),
      label: `${oS.getDate()}–${oE.getDate()} ${SHORT[mIdx]}` });
    cur.setDate(cur.getDate() + 7); num++;
  }
  return weeks;
}

function getMonthsForPeriod(period) {
  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const now = new Date();
  const list = [];
  if (period === 'year') {
    for (let m = 0; m <= now.getMonth(); m++)
      list.push(MONTHS[m] + ' ' + now.getFullYear());
  } else {
    const count = period === 'quarter' ? 3 : 6;
    for (let i = count - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      list.push(MONTHS[d.getMonth()] + ' ' + d.getFullYear());
    }
  }
  return list;
}

// ── SALES TABLE HELPERS (общие для менеджера и админа) ──
let _currentFilter = 'all';
function setFilter(f) {
  _currentFilter = f;
  loadCurrentTab();
}

function filterSales(sales, filter) {
  if (filter === 'active') return sales.filter(s => s.status === 'Активна');
  if (filter === 'draft')  return sales.filter(s => s.status === 'Черновик');
  if (filter === 'cancel') return sales.filter(s => s.status === 'Отменена');
  return sales;
}

function renderSaleRow(s, opts) {
  const showManager = !!opts.showManager;
  const canDelete = !!opts.canDelete;
  const st = s.status === 'Активна' ? 'active' : s.status === 'Черновик' ? 'draft' : 'cancel';
  const lang = (s.language || '').toString().toLowerCase();
  const langCode = lang.indexOf('рус') === 0 ? 'RU' : lang.indexOf('узб') === 0 ? 'UZ' : '';
  const num = String(s.num != null ? s.num : '—').padStart(3, '0');
  const fullCell = s.fullPayment === 'Да'
    ? '<span class="badge full">Да</span>'
    : '<span class="badge full-no">—</span>';
  return (
    '<tr data-row="' + s.rowIndex + '">' +
      '<td class="cell-num">' + num + '</td>' +
      '<td class="cell-name"><strong>' + (s.name || '—') + '</strong><span>Группа ' + (s.group || '—') + '</span></td>' +
      (showManager ? '<td>' + (s.manager || '—') + '</td>' : '') +
      '<td><span class="course-pill">' + (s.course || '—') + (langCode ? ' <span class="lang">' + langCode + '</span>' : '') + '</span></td>' +
      '<td class="cell-money">' + fmt(s.totalContract) + ' <small>сум</small></td>' +
      '<td class="cell-money">' + fmt(s.monthContract) + '</td>' +
      '<td>' + fullCell + '</td>' +
      '<td><span class="badge ' + st + '" onclick="cycleStatus(this, ' + s.rowIndex + ')">' + s.status + '</span></td>' +
      '<td class="cell-actions">' +
        '<button class="icon-btn" onclick="openEditSale(' + s.rowIndex + ')">✏</button>' +
        (canDelete ? '<button class="icon-btn" onclick="deleteSale(' + s.rowIndex + ')">⋯</button>' : '') +
      '</td>' +
    '</tr>'
  );
}

function renderSalesSheet(sales, opts) {
  opts = opts || {};
  const showManager = !!opts.showManager;
  const canDelete = !!opts.canDelete;
  const filter = opts.filter || 'all';
  const filtered = filterSales(sales, filter);

  const counts = {
    all: sales.length,
    active: sales.filter(s => s.status === 'Активна').length,
    draft: sales.filter(s => s.status === 'Черновик').length,
    cancel: sales.filter(s => s.status === 'Отменена').length,
  };

const STATUS_CYCLE = ['Активна', 'Черновик', 'Отменена'];
const STATUS_CLS = { 'Активна': 'active', 'Черновик': 'draft', 'Отменена': 'cancel' };

async function cycleStatus(badgeEl, rowIndex) {
  const current = badgeEl.textContent.trim();
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current) + 1) % 3];

  // Optimistic UI
  Object.values(STATUS_CLS).forEach(c => badgeEl.classList.remove(c));
  badgeEl.classList.add(STATUS_CLS[next]);
  badgeEl.textContent = next;

  try {
    const res = await api('setSaleStatus', {
      rowIndex: rowIndex, month: STATE.month, status: next
    });
    if (!res.success) {
      Object.values(STATUS_CLS).forEach(c => badgeEl.classList.remove(c));
      badgeEl.classList.add(STATUS_CLS[current]);
      badgeEl.textContent = current;
      toast(res.error || 'Ошибка', 'error');
      return;
    }
    toast('Статус: ' + next);

    const sale = (STATE.sales || []).find(s => s.rowIndex === rowIndex);
    if (sale) sale.status = next;

    refreshFilterCounts();

    if (STATE.user.role === 'manager') {
      setTimeout(function(){ loadCurrentTab(); }, 250);
    }
  } catch (e) {
    Object.values(STATUS_CLS).forEach(c => badgeEl.classList.remove(c));
    badgeEl.classList.add(STATUS_CLS[current]);
    badgeEl.textContent = current;
    toast('Ошибка соединения', 'error');
  }
}

function refreshFilterCounts() {
  if (!STATE.sales) return;
  const counts = {
    all: STATE.sales.length,
    active: STATE.sales.filter(s => s.status === 'Активна').length,
    draft: STATE.sales.filter(s => s.status === 'Черновик').length,
    cancel: STATE.sales.filter(s => s.status === 'Отменена').length,
  };
  const map = ['all','active','draft','cancel'];
  document.querySelectorAll('.filter-chip').forEach((chip, i) => {
    const k = map[i];
    if (counts[k] !== undefined) {
      const cnt = chip.querySelector('.count');
      if (cnt) cnt.textContent = counts[k];
    }
  });
}

function toggleFullPay() {
  _fullPayOn = !_fullPayOn;
  const t = document.getElementById('ns-fullpay-toggle');
  if (t) t.className = 'toggle' + (_fullPayOn ? ' on' : '');

async function submitSale() {
  const name = document.getElementById('ns-name')?.value.trim();
  const group = document.getElementById('ns-group')?.value.trim();
  const course = document.getElementById('ns-course')?.value;
  const lang = document.getElementById('ns-lang')?.value;
  const source = document.getElementById('ns-source')?.value;
  const payment = document.getElementById('ns-payment')?.value;
  const total = document.getElementById('ns-total')?.value;
  const contractLink = document.getElementById('ns-contract-link')?.value.trim();
  const paymentLink = document.getElementById('ns-payment-link')?.value.trim();

  if (!name || !group || !course || !lang || !source || !payment || !total) {
    toast('Заполните все обязательные поля', 'error'); return;
  }
  if (!contractLink) {
    toast('❌ Укажите номер договора.', 'error'); return;
  }

  if (_fullPayOn && !paymentLink) {
    const warn = document.getElementById('ns-payment-warning');
    if (warn) warn.classList.remove('hidden');
    const confirmed = confirm('Вы не прикрепили документ подтверждения 100% оплаты.\n\nПродолжить без него?');
    if (!confirmed) return;
  }

  const monthContract = Math.round(Number(total) / 2);
  const res = await api('addSale', {
    month: STATE.month,
    sale: {
      name, group, course, language: lang, source,
      payment: Number(payment),
      totalContract: Number(total),
      monthContract,
      fullPayment: _fullPayOn,
      contractLink,
      paymentLink: paymentLink || '',
      manager: STATE.user.name,
    }
  });

  if (res.success) {
    toast('✅ Сделка успешно добавлена!');
    closeModal();
    _fullPayOn = false;
    await renderManagerDashboard();
    setActiveNav('dashboard');
  } else {
    toast(res.error || 'Ошибка при сохранении', 'error');
  }
}

  managers.forEach(m => {

async function loadTrend(period, btn) {
  document.querySelectorAll('.trend-period-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const months = getMonthsForPeriod(period);
  const res    = await api('getTrend', { months });
  const trend  = res.trend || [];
  const maxSales = Math.max(1, ...trend.map(t => t.sales));
  const SHORT_MON = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

  const bars = trend.map((t, i) => {
    const h   = Math.max(4, Math.round(t.sales / maxSales * 100));
    const prev = trend[i-1];
    let deltaHtml = '';
    if (prev && prev.sales > 0) {
      const delta = Math.round((t.sales - prev.sales) / prev.sales * 100);
      const cls   = delta >= 0 ? 'up' : 'down';
      const sign  = delta >= 0 ? '+' : '';
      deltaHtml = `<div class="trend-delta ${cls}">${sign}${delta}%</div>`;
    }
    const mParts = t.month.split(' ');
    const mIdx   = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'].indexOf(mParts[0]);
    const label  = mIdx >= 0 ? SHORT_MON[mIdx] : mParts[0];
    return `<div class="trend-col">
      ${deltaHtml}
      <div class="trend-count">${t.sales}</div>
      <div class="trend-bar-wrap"><div class="trend-bar" style="height:${h}px"></div></div>
      <div class="trend-month">${label}<br>${mParts[1]}</div>
    </div>`;
  }).join('');

  const chart = document.getElementById('trend-chart');
  if (chart) chart.innerHTML = `<div class="trend-bars">${bars || '<div style="color:var(--muted-2)">Нет данных</div>'}</div>`;
}

          '</div>' +

function calcRecalc() {
  const sales = Number(document.getElementById('calc-sales').value) || 0;
  const full = Number(document.getElementById('calc-full').value) || 0;
  const avg = Number(document.getElementById('calc-avg').value) || 0;
  const revenue = sales * avg * 1000000;

  // подобрать уровень
  let level = null;
  for (let i = (STATE.scale || []).length - 1; i >= 0; i--) {
    if (sales >= STATE.scale[i].min) { level = STATE.scale[i]; break; }
  }
  const rate = level ? level.rate : 0.05;
  const commission = revenue * rate;
  const baseBonus100 = (STATE.scale || []).reduce(function(a,l){ return a || l.bonus100; }, 0);
  const bonus = Math.floor(full / 20) * baseBonus100;
  const premium = level ? (level.premium35 || 0) : 0;
  const salary = STATE.user.salary || 0;
  const total = salary + commission + bonus + premium;

  document.getElementById('calc-total').innerHTML = (total / 1000000).toFixed(2) + '<sup>млн</sup>';
  document.getElementById('calc-break').innerHTML =
    '<div>Уровень<strong>' + (level ? level.min + '–' + level.max : '—') + '</strong></div>' +
    '<div>Комиссия<strong>' + (commission/1000000).toFixed(2) + 'M</strong></div>' +
    '<div>Бонус 100%<strong>' + (bonus/1000000).toFixed(2) + 'M</strong></div>' +
    '<div>Премия<strong>' + (premium/1000000).toFixed(2) + 'M</strong></div>';
}

    const rows = events.length ? events.map(function(e) {
      const ts = e.timestamp instanceof Date ? e.timestamp : (typeof e.timestamp === 'string' ? new Date(e.timestamp) : null);
      const tsStr = ts ? ts.toLocaleString('ru-RU') : '';
      let detailsStr = '';
      if (e.details) {

          detailsStr = Object.keys(e.details.changes).map(function(k) {

          if (e.details.name) detailsStr = '<strong>' + e.details.name + '</strong> · ' + detailsStr;
        } else {
          detailsStr = Object.keys(e.details).map(function(k) { return k + ': ' + e.details[k]; }).join(' · ');
        }
      }
      const actionBadge = '<span class="badge ' + actionColor(e.action) + '" style="cursor:default">' + actionLabel(e.action) + '</span>';
      return '<tr>' +
        '<td class="cell-num">' + tsStr + '</td>' +
        '<td><strong>' + e.user + '</strong> <span class="cell-num">' + e.role + '</span></td>' +
        '<td>' + actionBadge + '</td>' +
        '<td>' + (e.month || '—') + '</td>' +

        '<table>' +
          '<thead><tr><th>Дата</th><th>Кто</th><th>Действие</th><th>Месяц</th><th>Детали</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>';
  } catch (err) {
    el.innerHTML = '<div style="padding:60px;color:var(--red)">Ошибка: ' + err.message + '</div>';
  }
}

function actionLabel(a) {
  const map = {
    created: 'Создание', edited: 'Правка', deleted: 'Удаление', status_changed: 'Смена статуса',
    month_closed: 'Закрытие', month_opened: 'Открытие',
    unlock_requested: 'Запрос', request_approved: 'Одобрено', request_rejected: 'Отклонено',
    goal_updated: 'Цели',
  };
  return map[a] || a;
}

function actionColor(a) {
  if (a === 'deleted' || a === 'request_rejected') return 'cancel';
  if (a === 'created' || a === 'request_approved' || a === 'month_opened') return 'active';
  if (a === 'month_closed' || a === 'unlock_requested') return 'draft';
  return 'active';
}

async function renderAdminRequests() {
  const el = document.getElementById('tab-requests');

    const renderReq = function(r, withActions) {
      const ts = r.createdAt instanceof Date ? r.createdAt.toLocaleString('ru-RU') : (r.createdAt || '');
      const actions = withActions
        ? '<div class="modal-actions-right">' +
            '<button class="btn btn-line" onclick="resolveReq(\'' + r.id + '\',\'reject\')">❌ Отклонить</button>' +
            '<button class="btn btn-ink" onclick="resolveReq(\'' + r.id + '\',\'approve\')">✅ Одобрить</button>' +
          '</div>'
        : '<div class="modal-meta">' + r.status + ' · ' + (r.resolvedBy || '') + '</div>';
      return '<div class="mgr-card">' +
        '<div class="mgr-head">' +
          '<div class="mgr-id">' +
            '<div class="mgr-avatar purple">' + (r.manager || '?')[0] + '</div>' +
            '<div><div class="mgr-name">' + r.manager + '</div><div class="mgr-level">' + r.month + ' · ' + ts + '</div></div>' +
          '</div>' +
        '</div>' +
        (r.comment ? '<div style="background:var(--surface-2);padding:var(--sp-3);border-radius:var(--r-sm);font-size:13px;color:var(--text-2)">«' + r.comment + '»</div>' : '') +
        actions +
      '</div>';
    };

    const pendingHtml = pending.length
      ? '<div class="mgr-grid">' + pending.map(function(r) { return renderReq(r, true); }).join('') + '</div>'
      : '<div style="padding:40px;text-align:center;color:var(--muted)">Pending запросов нет</div>';

    const doneHtml = done.length
      ? '<div class="mgr-grid" style="margin-top:var(--sp-5)">' + done.map(function(r) { return renderReq(r, false); }).join('') + '</div>'
      : '';

    el.innerHTML =
      '<div class="page-head">' +
        '<div>' +
          '<h1 class="page-title">Запросы на открытие месяцев</h1>' +
          '<div class="page-title-sub">' + pending.length + ' ожидают решения</div>' +
        '</div>' +

      pendingHtml +
      (doneHtml ? '<div style="margin-top:var(--sp-6);font-family:var(--font-sans);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Обработанные</div>' + doneHtml : '');

    el.innerHTML = '<div style="padding:60px;color:var(--red)">Ошибка: ' + err.message + '</div>';

  STATE.managers = mgData.managers || [];
  STATE.scale    = scData.scale    || [];

  const inpStyle = 'background:var(--surface-2);border:1.5px solid transparent;border-radius:8px;padding:8px 12px;color:var(--ink);font-family:var(--font-sans);font-size:14px;width:100%;outline:none;transition:border-color .2s';

  const cards = STATE.managers.map(m => `
    <div class="mgr-card">
      <div class="mgr-head">
        <div class="mgr-avatar purple">${m.name[0]}</div>
        <div>
          <div class="mgr-name">${m.name}</div>
          <div class="mgr-level">Оклад: ${fmt(m.salary)} сум</div>
        </div>
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>План (продаж в месяц)</label>
        <input type="number" class="plan-input" id="plan-${m.rowIndex}" value="${m.plan || 40}" placeholder="40">
      </div>
      <div style="display:flex;gap:8px;padding-top:var(--sp-3);border-top:1px solid var(--line);">
        <button class="btn btn-ink" style="flex:1" onclick="savePlan(${m.rowIndex},'${m.name}')">💾 Сохранить план</button>
        <button class="btn btn-line" onclick="editManager(${m.rowIndex},'${m.name}','${m.password}',${m.salary})">✏️</button>
        <button class="btn btn-line" onclick="deleteManager(${m.rowIndex})">🗑</button>
      </div>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="page-head">
      <div>
        <h1 class="page-title">Менеджеры</h1>
        <div class="page-title-sub">Управление командой</div>
      </div>
      <div class="page-meta">
        <button class="btn btn-ink" onclick="addManagerModal()">+ Добавить</button>
      </div>
    </div>
    <div class="mgr-grid">${cards}</div>
  `;
}

async function savePlan(rowIndex, name) {
  const val = document.getElementById(`plan-${rowIndex}`)?.value;
  if (!val) { toast('Введите план', 'warning'); return; }
  const res = await api('setManagerPlan', { manager: name, plan: Number(val) });
  if (res.success) toast(`✅ План для ${name} сохранён: ${val} продаж`);
  else toast(res.error||'Ошибка', 'error');
}

function editManager(rowIndex, name, password, salary) {
  showModal(`Редактировать: ${name}`, `
    <div class="field"><label>Имя</label><input type="text" id="em-name" value="${name}"></div>
    <div class="field"><label>Пароль (для входа)</label><input type="text" id="em-pass" value="${password}"></div>
    <div class="field"><label>Оклад (сум)</label><input type="number" id="em-sal" value="${salary}"></div>
    <div class="modal-actions">
      <button class="btn btn-line" onclick="closeModal()">Отмена</button>
      <button class="btn btn-ink" onclick="saveManager(${rowIndex})">Сохранить</button>
    </div>
  `);
}

async function saveManager(rowIndex) {
  const name = document.getElementById('em-name')?.value.trim();
  const pass = document.getElementById('em-pass')?.value.trim();
  const sal  = document.getElementById('em-sal')?.value;
  if (!name||!pass) { toast('Заполните все поля','error'); return; }
  const res = await api('updateManager', { rowIndex, name, password: pass, salary: Number(sal) });
  if (res.success) { toast('✅ Данные менеджера обновлены'); closeModal(); await renderAdminManagers(); }
  else toast(res.error||'Ошибка','error');
}

function addManagerModal() {
  showModal('Новый менеджер', `
    <div class="field"><label>Имя</label><input type="text" id="am-name" placeholder="Имя менеджера"></div>
    <div class="field"><label>Пароль (для входа)</label><input type="text" id="am-pass" placeholder="Придумайте пароль"></div>
    <div class="field"><label>Оклад (сум)</label><input type="number" id="am-sal" placeholder="5000000"></div>
    <div class="modal-actions">
      <button class="btn btn-line" onclick="closeModal()">Отмена</button>
      <button class="btn btn-ink" onclick="doAddManager()">Добавить</button>
    </div>
  `);
}

async function doAddManager() {
  const name = document.getElementById('am-name')?.value.trim();
  const pass = document.getElementById('am-pass')?.value.trim();
  const sal  = document.getElementById('am-sal')?.value;
  if (!name||!pass) { toast('Заполните все поля','error'); return; }
  const res = await api('addManager', { name, password: pass, salary: Number(sal)||0 });
  if (res.success) { toast('✅ Менеджер добавлен'); closeModal(); await renderAdminManagers(); }
  else toast(res.error||'Ошибка','error');
}

async function deleteManager(rowIndex) {
  if (!confirm('Удалить менеджера?')) return;
  const res = await api('deleteManager', { rowIndex });
  if (res.success) { toast('Менеджер удалён'); await renderAdminManagers(); }
  else toast(res.error||'Ошибка','error');
}

// ── SETTINGS ──
async function renderSettings() {
  const el = document.getElementById('tab-settings');
  el.innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted)"><span class="loading-spinner" style="border-color:rgba(0,122,255,.2);border-top-color:var(--blue)"></span></div>';

  const [scData, cData] = await Promise.all([api('getScales'), api('getCourses')]);
  STATE.scale   = scData.scale   || [];
  STATE.courses = cData.courses  || [];

  const inp = 'background:var(--surface-2);border:1px solid transparent;border-radius:6px;padding:6px 10px;color:var(--ink);font-family:var(--font-sans);font-size:13px;width:100%;outline:none';

  const scaleRows = STATE.scale.map((s,i) => `
    <tr>
      <td><input type="number" value="${s.min}"         id="sc-min-${i}"  style="${inp}"></td>
      <td><input type="number" value="${s.max}"         id="sc-max-${i}"  style="${inp}"></td>
      <td><input type="number" step="0.001" value="${s.rate}" id="sc-rate-${i}" style="${inp}"></td>
      <td><input type="number" value="${s.bonus100||''}" id="sc-b100-${i}" style="${inp}" placeholder="—"></td>
      <td><input type="number" value="${s.premium35||''}" id="sc-p35-${i}" style="${inp}" placeholder="—"></td>
    </tr>
  `).join('');

  const courseList = STATE.courses.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--line)">
      <span style="flex:1;font-size:14px;color:var(--ink)">${c}</span>
      <button class="btn btn-line btn-xs" onclick="deleteCourse('${c}')">Удалить</button>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="page-head">
      <div>
        <h1 class="page-title">Настройки</h1>
        <div class="page-title-sub">Шкала процентов и курсы</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">📊 Шкала процентов</span>
          <button class="btn btn-ink" onclick="saveScales()">💾 Сохранить</button>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>MIN</th><th>MAX</th><th>%</th><th>Бонус 100%</th><th>Премия 50+</th></tr></thead>
            <tbody id="scale-tbody">${scaleRows}</tbody>
          </table>
        </div>
      </div>

      <div class="sheet" style="padding:0">
        <div class="table-header">
          <span class="table-title">📚 Список курсов</span>
          <button class="btn btn-ink" onclick="addCoursePrompt()">+ Добавить</button>
        </div>
        <div style="padding:var(--sp-3) var(--sp-5)">
        <div id="courses-list">${courseList}</div>
        </div>
      </div>
    </div>
  `;
}

async function saveScales() {
  const scale = STATE.scale.map((s,i) => ({
    min:      Number(document.getElementById(`sc-min-${i}`)?.value  || s.min),
    max:      Number(document.getElementById(`sc-max-${i}`)?.value  || s.max),
    rate:     Number(document.getElementById(`sc-rate-${i}`)?.value || s.rate),
    bonus100: Number(document.getElementById(`sc-b100-${i}`)?.value) || 0,
    premium35:Number(document.getElementById(`sc-p35-${i}`)?.value)  || 0,
  }));
  const res = await api('updateScales', { scale });
  if (res.success) toast('✅ Шкала обновлена');
  else toast(res.error||'Ошибка','error');
}

function addCoursePrompt() {
  const name = prompt('Название нового курса:');
  if (!name?.trim()) return;
  api('addCourse', { course: name.trim() }).then(res => {
    if (res.success) { toast('✅ Курс добавлен'); renderSettings(); }
    else toast(res.error||'Ошибка','error');
  });
}

async function deleteCourse(course) {
  if (!confirm(`Удалить курс "${course}"?`)) return;
  const res = await api('deleteCourse', { course });
  if (res.success) { toast('Курс удалён'); await renderSettings(); }
  else toast(res.error||'Ошибка','error');
}
</script>
</body>
</html>
