<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Точка Роста — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --s1: #13161f;
  --s2: #1a1e2a;
  --s3: #232838;
  --border: #2a3045;
  --accent: #4f8ef7;
  --accent2: #f7614f;
  --green: #2ecc87;
  --yellow: #f7c94f;
  --purple: #a855f7;
  --text: #e2e8f4;
  --muted: #6b7594;
  --r: 12px;
  --font: 'Geologica', sans-serif;
  --font2: 'Unbounded', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 60% at 15% -10%,rgba(79,142,247,.12) 0%,transparent 55%),
             radial-gradient(ellipse 50% 50% at 85% 110%,rgba(247,97,79,.08) 0%,transparent 55%);
  pointer-events:none}

/* ── UTILS ── */
.hidden{display:none!important}
.z1{position:relative;z-index:1}

/* ── SCREEN MANAGER ── */
.screen{display:none;position:relative;z-index:1}
.screen.active{display:block}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
#s-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-wrap{width:100%;max-width:420px}
.login-logo{font-family:var(--font2);font-size:28px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),#7eb8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;letter-spacing:-.02em}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:40px;font-weight:300}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:40px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.field input,.field select,.field textarea{
  width:100%;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 16px;color:var(--text);
  font-family:var(--font);font-size:14px;transition:border .2s,box-shadow .2s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
.field select option{background:var(--s2)}
.field textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--r);padding:13px 24px;
  font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;
  transition:all .2s;text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),#3a7aee);color:#fff;width:100%}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,142,247,.35)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(247,97,79,.15);border:1px solid rgba(247,97,79,.3);color:var(--accent2)}
.btn-danger:hover{background:rgba(247,97,79,.25)}
.btn-green{background:linear-gradient(135deg,var(--green),#25a870);color:#fff}
.btn-yellow{background:linear-gradient(135deg,var(--yellow),#e8b83a);color:#111}
.err{color:var(--accent2);font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.loading-spinner{display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#s-app{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  background:rgba(13,15,20,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;
  justify-content:space-between;height:60px;
  position:sticky;top:0;z-index:100}
.topbar-logo{font-family:var(--font2);font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),#7eb8ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-nav{display:flex;gap:4px}
.nav-btn{background:none;border:none;color:var(--muted);padding:8px 14px;
  border-radius:8px;cursor:pointer;font-family:var(--font);font-size:13px;
  font-weight:500;transition:all .2s}
.nav-btn:hover,.nav-btn.active{background:var(--s2);color:var(--text)}
.nav-btn.active{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-chip{display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:30px;padding:5px 14px 5px 8px}
.user-av{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff}
.user-name{font-size:13px;font-weight:500}
.month-sel{background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;color:var(--text);
  font-family:var(--font);font-size:13px;cursor:pointer;outline:none}

.main-content{flex:1;padding:28px 24px;max-width:1400px;margin:0 auto;width:100%}

/* ── TABS ── */
.tab-content{display:none}
.tab-content.active{display:block}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.page-title{font-family:var(--font2);font-size:20px;font-weight:700;letter-spacing:-.02em}
.page-sub{color:var(--muted);font-size:13px;margin-top:2px}

/* ═══════════════════════════════════════
   GRID / STAT CARDS
═══════════════════════════════════════ */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);pointer-events:none}
.stat-icon{font-size:22px;margin-bottom:10px}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.stat-value{font-family:var(--font2);font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
.stat-value.blue{color:var(--accent)}
.stat-value.green{color:var(--green)}
.stat-value.yellow{color:var(--yellow)}
.stat-value.red{color:var(--accent2)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}
.stat-card.highlight{border-color:var(--accent);background:linear-gradient(135deg,rgba(79,142,247,.08),var(--s1))}

/* ═══════════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════════ */
.progress-wrap{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.progress-title{font-weight:600;font-size:15px}
.progress-badge{background:var(--s3);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--accent)}
.progress-bar-bg{height:12px;background:var(--s3);border-radius:20px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{height:100%;border-radius:20px;transition:width 1s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,var(--accent),var(--purple))}
.progress-bar-fill.green{background:linear-gradient(90deg,var(--green),#1db97a)}
.progress-bar-fill.yellow{background:linear-gradient(90deg,var(--yellow),#f0a020)}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}

/* ═══════════════════════════════════════
   MOTIVATION BANNER
═══════════════════════════════════════ */
.motive-banner{
  background:linear-gradient(135deg,rgba(79,142,247,.15),rgba(168,85,247,.1));
  border:1px solid rgba(79,142,247,.3);border-radius:16px;
  padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px}
.motive-emoji{font-size:32px;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.motive-text{font-size:15px;font-weight:500;line-height:1.5}
.motive-sub{font-size:13px;color:var(--muted);margin-top:4px}

/* ═══════════════════════════════════════
   LEVEL BADGE
═══════════════════════════════════════ */
.level-card{background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(79,142,247,.08));
  border:1px solid rgba(168,85,247,.3);border-radius:16px;padding:20px;margin-bottom:20px;
  display:flex;align-items:center;gap:20px}
.level-stars{font-size:28px;letter-spacing:4px}
.level-info .level-name{font-family:var(--font2);font-size:16px;font-weight:700;color:var(--purple)}
.level-info .level-range{font-size:13px;color:var(--muted);margin-top:2px}
.level-rate{margin-left:auto;text-align:right}
.level-rate .rate-num{font-family:var(--font2);font-size:28px;font-weight:800;color:var(--accent)}
.level-rate .rate-label{font-size:12px;color:var(--muted)}

/* ═══════════════════════════════════════
   TABLE
═══════════════════════════════════════ */
.table-wrap{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.table-title{font-weight:600;font-size:15px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--s2);padding:12px 14px;text-align:left;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);white-space:nowrap}
tbody tr{border-top:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:12px 14px;font-size:13px;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(46,204,135,.15);color:var(--green)}
.badge-yellow{background:rgba(247,201,79,.15);color:var(--yellow)}
.badge-red{background:rgba(247,97,79,.15);color:var(--accent2)}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-purple{background:rgba(168,85,247,.15);color:var(--purple)}
.table-empty{text-align:center;padding:48px;color:var(--muted)}
.link-icon{color:var(--accent);text-decoration:none;font-size:18px;
  display:inline-flex;align-items:center;padding:4px}
.link-icon:hover{color:#7eb8ff}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;transition:opacity .25s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:580px;max-height:90vh;overflow-y:auto;
  transform:translateY(20px);transition:transform .25s;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:24px 28px 0;margin-bottom:24px}
.modal-title{font-family:var(--font2);font-size:16px;font-weight:700}
.modal-close{background:var(--s3);border:none;color:var(--muted);
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all .15s}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:0 28px 28px}
.modal-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.modal-actions .btn{flex:1;min-width:120px}

/* ── FORM SECTIONS ── */
.form-section{margin-bottom:20px}
.form-section-title{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}

/* ── FILE UPLOAD ── */
.file-upload-zone{
  border:2px dashed var(--border);border-radius:12px;
  padding:20px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--s2)}
.file-upload-zone:hover,.file-upload-zone.dragover{
  border-color:var(--accent);background:rgba(79,142,247,.05)}
.file-upload-zone .upload-icon{font-size:28px;margin-bottom:8px}
.file-upload-zone .upload-text{font-size:13px;color:var(--muted)}
.file-upload-zone .upload-text span{color:var(--accent);font-weight:600}
.file-uploaded{display:flex;align-items:center;gap:10px;
  background:rgba(46,204,135,.08);border:1px solid rgba(46,204,135,.25);
  border-radius:10px;padding:10px 14px;font-size:13px}
.file-uploaded .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-uploaded .remove-file{background:none;border:none;color:var(--accent2);
  cursor:pointer;font-size:16px;padding:0 4px}
.upload-warning{background:rgba(247,201,79,.08);border:1px solid rgba(247,201,79,.25);
  border-radius:10px;padding:14px 16px;font-size:13px;margin-top:12px;line-height:1.5}
.upload-warning strong{color:var(--yellow)}
input[type=file]{display:none}

/* ── TOGGLE ── */
.toggle-wrap{display:flex;align-items:center;gap:10px;margin-top:4px}
.toggle{width:44px;height:24px;background:var(--s3);border-radius:12px;
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
  border:none;outline:none}
.toggle::after{content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;background:#fff;border-radius:50%;
  transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on{background:var(--green)}
.toggle.on::after{transform:translateX(20px)}
.toggle-label{font-size:13px;font-weight:500}

/* ═══════════════════════════════════════
   ADMIN SPECIFIC
═══════════════════════════════════════ */
.manager-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.manager-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px}
.manager-card-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.manager-av-lg{width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font2);font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.manager-name{font-weight:600;font-size:15px}
.manager-role{font-size:12px;color:var(--muted)}
.manager-stats-row{display:flex;gap:16px;flex-wrap:wrap}
.mgr-stat{flex:1;min-width:60px}
.mgr-stat-val{font-family:var(--font2);font-size:18px;font-weight:700}
.mgr-stat-lbl{font-size:11px;color:var(--muted);margin-top:1px}
.manager-card-actions{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}

/* ── COURSE/LANG CHART ── */
.chart-bar-wrap{margin-top:8px}
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-label{font-size:12px;color:var(--muted);min-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-track{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.chart-fill{height:100%;border-radius:4px;transition:width .8s ease;
  background:linear-gradient(90deg,var(--accent),var(--purple))}
.chart-count{font-size:12px;color:var(--muted);min-width:24px;text-align:right}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--s2);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;font-size:13px;min-width:280px;max-width:380px;
  display:flex;align-items:center;gap:10px;
  animation:toastIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--accent2)}
.toast.warning{border-left:3px solid var(--yellow)}
.toast-icon{font-size:18px;flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── PLAN PROGRESS ── */
.plan-ring-wrap{display:flex;align-items:center;justify-content:center;padding:10px 0 20px}
.plan-ring-svg{transform:rotate(-90deg)}
.plan-ring-track{fill:none;stroke:var(--s3);stroke-width:8}
.plan-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.plan-ring-text{transform:rotate(90deg);transform-origin:center}
.plan-ring-num{font-family:var(--font2);font-size:18px;font-weight:800;fill:var(--text);text-anchor:middle}
.plan-ring-lbl{font-family:var(--font);font-size:9px;fill:var(--muted);text-anchor:middle}

/* ── BONUS CHIPS ── */
.bonus-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.bonus-chip{background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;flex:1;min-width:140px}
.bonus-chip-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.bonus-chip-val{font-family:var(--font2);font-size:16px;font-weight:700;color:var(--yellow)}
.bonus-chip.active{border-color:var(--yellow);background:rgba(247,201,79,.06)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar .field{margin-bottom:0;min-width:180px}
.filter-bar select,.filter-bar input{padding:8px 14px}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SCREENS
═══════════════════════════════════════ -->

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-wrap z1">
    <div class="login-logo">Точка Роста</div>
    <div class="login-sub">CRM система отдела продаж</div>
    <div class="card">
      <div class="field">
        <label>Логин</label>
        <input type="text" id="li-user" placeholder="Введите логин" autocomplete="username">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="li-pass" placeholder="Введите пароль" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="li-btn" onclick="doLogin()">Войти</button>
      <div class="err" id="li-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="s-app" class="screen">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">Точка Роста</div>
    <div class="topbar-nav" id="topbar-nav"></div>
    <div class="topbar-right">
      <select class="month-sel" id="month-sel" onchange="onMonthChange()"></select>
      <div class="user-chip">
        <div class="user-av" id="user-av">?</div>
        <span class="user-name" id="user-name">...</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <!-- Content -->
  <div class="main-content" id="main-content"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Заголовок</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — замени на свой Apps Script URL после деплоя
// ═══════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/ВАШ_ДЕПЛОЙ_URL/exec';

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let STATE = {
  user: null, // { name, role, salary }
  month: currentMonthName(),
  dashboard: null,
  sales: [],
  managers: [],
  courses: [],
  scale: [],
};

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function currentMonthName() {
  const now = new Date();
  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return months[now.getMonth()] + ' ' + now.getFullYear();
}

function fmt(n) {
  return new Intl.NumberFormat('ru-RU').format(Math.round(n || 0));
}

function fmtPct(n) { return ((n||0)*100).toFixed(2) + '%'; }

async function api(action, data={}) {
  const body = JSON.stringify({ action, ...data });
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body,
    headers: { 'Content-Type': 'application/json' },
  });
  return res.json();
}

function toast(msg, type='success') {
  const icons = { success:'✅', error:'❌', warning:'⚠️' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function showModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function screen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setActiveNav(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + tab);
  });
}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
async function doLogin() {
  const btn = document.getElementById('li-btn');
  const err = document.getElementById('li-err');
  const user = document.getElementById('li-user').value.trim();
  const pass = document.getElementById('li-pass').value.trim();
  if (!user || !pass) { err.textContent = 'Введите логин и пароль'; return; }

  btn.innerHTML = '<span class="loading-spinner"></span>';
  btn.disabled = true;
  err.textContent = '';

  try {
    const res = await api('login', { username: user, password: pass });
    if (res.success) {
      STATE.user = res;
      initApp();
    } else {
      err.textContent = res.error || 'Ошибка входа';
    }
  } catch(e) {
    err.textContent = 'Ошибка соединения с сервером';
  } finally {
    btn.innerHTML = 'Войти';
    btn.disabled = false;
  }
}

document.getElementById('li-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  STATE = { user: null, month: currentMonthName(), dashboard: null, sales: [], managers: [], courses: [], scale: [] };
  screen('s-login');
}

// ═══════════════════════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════════════════════
async function initApp() {
  screen('s-app');
  const u = STATE.user;

  // Avatar
  document.getElementById('user-av').textContent = (u.name||'?')[0].toUpperCase();
  document.getElementById('user-name').textContent = u.name;

  // Nav tabs
  const nav = document.getElementById('topbar-nav');
  const content = document.getElementById('main-content');
  nav.innerHTML = '';
  content.innerHTML = '';

  const tabs = getTabsForRole(u.role);
  tabs.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'nav-btn' + (i===0?' active':'');
    b.textContent = t.label;
    b.dataset.tab = t.id;
    b.onclick = () => { setActiveNav(t.id); };
    nav.appendChild(b);

    const div = document.createElement('div');
    div.className = 'tab-content' + (i===0?' active':'');
    div.id = 'tab-' + t.id;
    content.appendChild(div);
  });

  // Month selector
  await loadMonthSelector();

  // Load initial data
  await loadCurrentTab();
}

function getTabsForRole(role) {
  if (role === 'manager') {
    return [
      { id: 'dashboard', label: '📊 Дашборд' },
      { id: 'sales', label: '📋 Реестр продаж' },
    ];
  }
  if (role === 'admin_full') {
    return [
      { id: 'overview', label: '📊 Обзор' },
      { id: 'registry', label: '📋 Реестр' },
      { id: 'managers', label: '👥 Менеджеры' },
      { id: 'settings', label: '⚙️ Настройки' },
    ];
  }
  if (role === 'admin_view') {
    return [
      { id: 'overview', label: '📊 Обзор' },
      { id: 'registry', label: '📋 Реестр' },
    ];
  }
  return [];
}

async function loadMonthSelector() {
  const sel = document.getElementById('month-sel');
  sel.innerHTML = '';

  // Генерируем список месяцев (последние 6 + текущий)
  const now = new Date();
  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const name = months[d.getMonth()] + ' ' + d.getFullYear();
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === STATE.month) opt.selected = true;
    sel.appendChild(opt);
  }
}

async function onMonthChange() {
  STATE.month = document.getElementById('month-sel').value;
  await loadCurrentTab();
}

async function loadCurrentTab() {
  const activeTab = document.querySelector('.nav-btn.active')?.dataset.tab;
  if (!activeTab) return;

  const role = STATE.user.role;
  if (role === 'manager') {
    if (activeTab === 'dashboard') await renderManagerDashboard();
    if (activeTab === 'sales') await renderManagerSales();
  } else {
    if (activeTab === 'overview') await renderAdminOverview();
    if (activeTab === 'registry') await renderAdminRegistry();
    if (activeTab === 'managers') await renderAdminManagers();
    if (activeTab === 'settings') await renderSettings();
  }
}

// Intercept nav clicks
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  setActiveNav(btn.dataset.tab);
  await loadCurrentTab();
});

// ═══════════════════════════════════════════════════════════
// MANAGER DASHBOARD
// ═══════════════════════════════════════════════════════════
async function renderManagerDashboard() {
  const el = document.getElementById('tab-dashboard');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><span class="loading-spinner" style="border-color:rgba(79,142,247,.3);border-top-color:var(--accent)"></span></div>';

  const data = await api('getManagerDashboard', { manager: STATE.user.name, month: STATE.month });
  STATE.dashboard = data;

  const planPct = Math.min(100, Math.round((data.totalSales / (data.plan || 40)) * 100));
  const lvl = data.level || '0-10';
  const rate = fmtPct(data.commissionRate);
  const motive = getMotivation(data.totalSales, data.plan, data.toNextLevel);
  const circumference = 2 * Math.PI * 54;
  const dashOffset = circumference * (1 - planPct / 100);

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Мой дашборд</div>
        <div class="page-sub">${STATE.month} · ${STATE.user.name}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddSaleModal()">+ Добавить сделку</button>
    </div>

    <!-- Мотивация -->
    <div class="motive-banner">
      <span class="motive-emoji">${motive.emoji}</span>
      <div>
        <div class="motive-text">${motive.text}</div>
        <div class="motive-sub">${motive.sub}</div>
      </div>
    </div>

    <!-- Текущий уровень -->
    <div class="level-card">
      <div class="level-stars">${getLevelStars(data.totalSales)}</div>
      <div class="level-info">
        <div class="level-name">${getLevelName(data.totalSales)}</div>
        <div class="level-range">Уровень ${lvl} продаж</div>
      </div>
      <div class="level-rate">
        <div class="rate-num">${rate}</div>
        <div class="rate-label">от выручки</div>
      </div>
    </div>

    <!-- Ключевые метрики -->
    <div class="grid-4">
      <div class="stat-card highlight">
        <div class="stat-icon">🎯</div>
        <div class="stat-label">Сделок / план</div>
        <div class="stat-value blue">${data.totalSales} <span style="font-size:14px;color:var(--muted)">/ ${data.plan}</span></div>
        <div class="stat-sub">${planPct}% выполнения</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Мои комиссионные</div>
        <div class="stat-value green">${fmt(data.commission)}</div>
        <div class="stat-sub">сум</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-label">100% оплаты</div>
        <div class="stat-value yellow">${data.fullPayments}</div>
        <div class="stat-sub">клиентов</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-label">Выручка (1й мес)</div>
        <div class="stat-value">${fmt(data.totalRevenue)}</div>
        <div class="stat-sub">сум</div>
      </div>
    </div>

    <!-- Прогресс план + следующий уровень -->
    <div class="grid-2">
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-title">📊 Выполнение плана</span>
          <span class="progress-badge">${data.totalSales} / ${data.plan}</span>
        </div>
        <div class="plan-ring-wrap">
          <svg width="130" height="130" viewBox="0 0 130 130" class="plan-ring-svg">
            <circle cx="65" cy="65" r="54" class="plan-ring-track"/>
            <circle cx="65" cy="65" r="54" class="plan-ring-fill"
              stroke="${planPct >= 100 ? 'var(--green)' : planPct >= 75 ? 'var(--yellow)' : 'var(--accent)'}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${dashOffset}"
              id="plan-ring"/>
            <text x="65" y="65" class="plan-ring-text">
              <tspan x="65" dy="-6" class="plan-ring-num">${planPct}%</tspan>
              <tspan x="65" dy="18" class="plan-ring-lbl">выполнено</tspan>
            </text>
          </svg>
        </div>
        ${data.toNextLevel ? `<div style="text-align:center;font-size:13px;color:var(--muted)">До следующего уровня: <strong style="color:var(--accent)">${data.toNextLevel} сделок</strong></div>` : '<div style="text-align:center;font-size:13px;color:var(--green)">🏆 Максимальный уровень!</div>'}
      </div>

      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-title">💎 Прогресс бонуса</span>
          <span class="progress-badge">${data.fullPayments} / ${data.fullPayments + data.toNextBonus}</span>
        </div>
        <div style="padding:10px 0">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill yellow" style="width:${Math.round((data.fullPayments % 20) / 20 * 100)}%"></div>
          </div>
          <div class="progress-labels">
            <span>100% оплаты</span>
            <span>До бонуса: ${data.toNextBonus}</span>
          </div>
          <div class="bonus-chips">
            <div class="bonus-chip ${data.bonusAmount > 0 ? 'active' : ''}">
              <div class="bonus-chip-label">Бонус 100%</div>
              <div class="bonus-chip-val">${fmt(data.bonusAmount || data.nextBonusAmount)}</div>
            </div>
            <div class="bonus-chip ${data.premiumBonus > 0 ? 'active' : ''}">
              <div class="bonus-chip-label">Премия 35+</div>
              <div class="bonus-chip-val">${fmt(data.premiumBonus || 0)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Итого к выплате -->
    <div class="stat-card" style="margin-bottom:24px;background:linear-gradient(135deg,rgba(46,204,135,.08),var(--s1));border-color:rgba(46,204,135,.25)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div class="stat-label">💵 Итого к выплате за ${STATE.month}</div>
          <div class="stat-value green" style="font-size:32px">${fmt(data.totalEarnings)}</div>
          <div class="stat-sub">Оклад ${fmt(data.salary)} + Комиссия ${fmt(data.commission)} + Бонусы ${fmt((data.bonusAmount||0)+(data.premiumBonus||0))}</div>
        </div>
        <div style="font-size:48px">🏆</div>
      </div>
    </div>
  `;
}

function getLevelName(n) {
  if (n <= 10) return 'Старт';
  if (n <= 20) return 'Развитие';
  if (n <= 30) return 'Прогресс';
  if (n <= 40) return 'Мастер';
  if (n <= 50) return 'Профи';
  if (n <= 60) return 'Эксперт';
  return 'Чемпион';
}
function getLevelStars(n) {
  if (n <= 10) return '⭐';
  if (n <= 20) return '⭐⭐';
  if (n <= 30) return '⭐⭐⭐';
  if (n <= 40) return '🌟🌟🌟🌟';
  if (n <= 50) return '💫💫💫💫💫';
  if (n <= 60) return '🔥🔥🔥🔥🔥🔥';
  return '🏆🏆🏆🏆🏆🏆🏆';
}
function getMotivation(sales, plan, toNext) {
  const pct = Math.round((sales / (plan||40)) * 100);
  if (sales === 0) return { emoji:'🚀', text:'Начни первую сделку сегодня!', sub:'Каждый великий результат начинается с первого шага.' };
  if (pct < 25) return { emoji:'💪', text:'Отличное начало! Разгоняемся!', sub:`Уже ${sales} сделок — продолжай в том же духе!` };
  if (pct < 50) return { emoji:'⚡', text:'Хороший темп! Ты на верном пути.', sub:`${toNext ? `До следующего уровня всего ${toNext} сделок!` : 'Держи ритм!'}` };
  if (pct < 75) return { emoji:'🔥', text:'Ты в ударе! Больше половины пути пройдено!', sub:'Не останавливайся — финиш уже виден.' };
  if (pct < 100) return { emoji:'🎯', text:'Почти у цели! Финальный рывок!', sub:`Осталось совсем немного до выполнения плана!` };
  if (pct === 100) return { emoji:'🏆', text:'ПЛАН ВЫПОЛНЕН! Поздравляю!', sub:'Ты достиг цели месяца. Каждая следующая сделка — это дополнительный бонус!' };
  return { emoji:'🚀', text:'ПЛАН ПЕРЕВЫПОЛНЕН! Ты легенда!', sub:`${pct}% плана! Максимальные бонусы активированы!` };
}

// ═══════════════════════════════════════════════════════════
// MANAGER SALES
// ═══════════════════════════════════════════════════════════
async function renderManagerSales() {
  const el = document.getElementById('tab-sales');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><span class="loading-spinner"></span></div>';

  const data = await api('getSales', { month: STATE.month, manager: STATE.user.name });
  STATE.sales = data.sales || [];

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Мои продажи</div>
        <div class="page-sub">${STATE.month} · ${STATE.sales.length} сделок</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddSaleModal()">+ Добавить сделку</button>
    </div>
    ${renderSalesTable(STATE.sales, false)}
  `;
}

function renderSalesTable(sales, showManager=true) {
  if (!sales.length) return `<div class="table-wrap"><div class="table-empty">🗂 Нет сделок за этот месяц</div></div>`;

  const rows = sales.map((s, i) => `
    <tr>
      <td style="color:var(--muted)">${s.num || i+1}</td>
      <td><strong>${s.name||'—'}</strong></td>
      ${showManager ? `<td><span class="badge badge-blue">${s.manager||'—'}</span></td>` : ''}
      <td style="color:var(--muted);font-size:12px">${s.group||'—'}</td>
      <td>${s.course||'—'}</td>
      <td><span class="badge ${(s.language||'').toLowerCase().includes('рус')?'badge-blue':'badge-purple'}">${s.language||'—'}</span></td>
      <td style="font-weight:600">${fmt(s.payment)}</td>
      <td style="color:var(--muted)">${fmt(s.totalContract)}</td>
      <td><span class="badge ${s.fullPayment==='Да'?'badge-green':'badge-yellow'}">${s.fullPayment==='Да'?'✅ 100%':'⏳ Частично'}</span></td>
      <td>
        ${s.contractLink ? `<a href="${s.contractLink}" target="_blank" class="link-icon" title="Договор">📄</a>` : '<span style="color:var(--accent2);font-size:12px">Нет</span>'}
        ${s.paymentLink ? `<a href="${s.paymentLink}" target="_blank" class="link-icon" title="Платёж">💳</a>` : ''}
      </td>
      <td style="color:var(--muted);font-size:12px">${s.date||'—'}</td>
    </tr>
  `).join('');

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>№</th><th>Ф.И.О.</th>
            ${showManager?'<th>Менеджер</th>':''}
            <th>Группа</th><th>Курс</th><th>Язык</th>
            <th>Оплата</th><th>Договор</th><th>Статус</th>
            <th>Файлы</th><th>Дата</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// ADD SALE MODAL
// ═══════════════════════════════════════════════════════════

      <div id="ns-payment-warning" class="upload-warning hidden">
        <strong>⚠️ Внимание!</strong> Если подтверждение оплаты не будет предоставлено,
        вам необходимо будет предоставить сводный отчёт администратору на подпись <strong>очно</strong>.
        100% оплата не будет засчитана в бонус без подтверждения.
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="submitSale()">Сохранить сделку</button>
    </div>
  `);
}

let _fullPayOn = false;
function toggleFullPay() {
  _fullPayOn = !_fullPayOn;
  const t = document.getElementById('ns-fullpay-toggle');
  if (t) t.className = 'toggle' + (_fullPayOn ? ' on' : '');
  const sec = document.getElementById('ns-payment-doc-section');
  if (sec) sec.classList.toggle('hidden', !_fullPayOn);
}

async function submitSale() {
  const name = document.getElementById('ns-name')?.value.trim();
  const group = document.getElementById('ns-group')?.value.trim();
  const course = document.getElementById('ns-course')?.value;
  const lang = document.getElementById('ns-lang')?.value;
  const payment = document.getElementById('ns-payment')?.value;
  const total = document.getElementById('ns-total')?.value;
  const contractLink = document.getElementById('ns-contract-link')?.value.trim();
  const paymentLink = document.getElementById('ns-payment-link')?.value.trim();

  if (!name || !group || !course || !lang || !payment || !total) {
    toast('Заполните все обязательные поля', 'error'); return;
  }
  if (!contractLink) {
    toast('❌ Договор обязателен! Прикрепите ссылку на подписанный договор.', 'error'); return;
  }

  // Предупреждение если 100% оплата без документа
  if (_fullPayOn && !paymentLink) {
    const warn = document.getElementById('ns-payment-warning');
    if (warn) warn.classList.remove('hidden');
    const confirmed = confirm('Вы не прикрепили документ подтверждения 100% оплаты.\n\nЕсли вы сохраните без подтверждения, вам необходимо будет предоставить сводный отчёт администратору на подпись очно.\n\nПродолжить?');
    if (!confirmed) return;
  }

  const monthContract = Math.round(Number(total) / 2);

  const res = await api('addSale', {
    month: STATE.month,
    sale: {
      name, group, course, language: lang,
      payment: Number(payment),
      totalContract: Number(total),
      monthContract,
      fullPayment: _fullPayOn,
      contractLink,
      paymentLink: paymentLink || '',
      manager: STATE.user.name,
    }
  });

  if (res.success) {
    toast('✅ Сделка успешно добавлена!');
    closeModal();
    _fullPayOn = false;
    // Обновить дашборд и список
    const role = STATE.user.role;
    await renderManagerDashboard();
    setActiveNav('dashboard');
  } else {
    toast(res.error || 'Ошибка при сохранении', 'error');
  }
}

function filterRegistry() {
  const mgr = document.getElementById('reg-filter-mgr')?.value;
  const pay = document.getElementById('reg-filter-pay')?.value;
  const search = document.getElementById('reg-search')?.value.toLowerCase();

  let filtered = STATE.sales;
  if (mgr) filtered = filtered.filter(s=>s.manager===mgr);
  if (pay === '100') filtered = filtered.filter(s=>s.fullPayment==='Да');
  if (pay === 'partial') filtered = filtered.filter(s=>s.fullPayment!=='Да');
  if (search) filtered = filtered.filter(s=>(s.name||'').toLowerCase().includes(search));

  document.getElementById('reg-table').innerHTML = renderSalesTableAdmin(filtered);
}

  if (!sales.length) return `<div class="table-wrap"><div class="table-empty">🗂 Нет сделок</div></div>`;

      <td><strong>${s.name||'—'}</strong></td>
      <td><span class="badge badge-blue">${s.manager||'—'}</span></td>
      <td style="color:var(--muted);font-size:12px">${s.group||'—'}</td>
      <td>${s.course||'—'}</td>
      <td><span class="badge ${(s.language||'').toLowerCase().includes('рус')||((s.language||'').toLowerCase()==='рус')?'badge-blue':'badge-purple'}">${s.language||'—'}</span></td>
      <td style="font-weight:600">${fmt(s.payment)}</td>
      <td>${fmt(s.totalContract)}</td>
      <td>${fmt(s.monthContract)}</td>
      <td><span class="badge ${s.fullPayment==='Да'?'badge-green':'badge-yellow'}">${s.fullPayment==='Да'?'✅ 100%':'⏳ Частично'}</span></td>
      <td>
        ${s.contractLink?`<a href="${s.contractLink}" target="_blank" class="link-icon">📄</a>`:'<span style="color:var(--accent2);font-size:12px">Нет</span>'}
        ${s.paymentLink?`<a href="${s.paymentLink}" target="_blank" class="link-icon">💳</a>`:''}

  return `

      <table>
        <thead>
          <tr>
            <th>№</th><th>Ф.И.О.</th><th>Менеджер</th><th>Группа</th>
            <th>Курс</th><th>Язык</th><th>Оплата</th><th>Договор</th>
            <th>1й мес</th><th>Статус</th><th>Файлы</th><th>Дата</th>

  if (!confirm(`Удалить курс "${course}"?`)) return;
  const res = await api('deleteCourse', { course });
  if (res.success) { toast('Курс удалён'); await renderSettings(); }
  else toast(res.error||'Ошибка','error');
}
</script>
</body>
</html>
